# 本地开发环境 · Local Development Environment
#
# 使用方法 · Usage:
#   docker compose up -d        启动 · Start
#   docker compose down         停止 · Stop
#   docker compose logs neo4j   查看日志 · View logs
#
# Neo4j 网页界面 · Web UI: http://localhost:7474
# 默认账号 · Default credentials: neo4j / devpassword

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: ai-teaching-neo4j
    ports:
      - "7474:7474"   # HTTP / browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ../data/kg:/import:ro       # 把 KG CSV mount 进去方便导入
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
